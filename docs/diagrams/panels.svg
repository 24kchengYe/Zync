  <rect x="770" y="208" width="93" height="22" rx="4" fill="url(#itemGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.25"/>
  <text x="816" y="223" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="8">Commit</text>

  <rect x="668" y="234" width="93" height="22" rx="4" fill="url(#itemGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.25"/>
  <text x="714" y="249" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="8">Pull</text>
  <rect x="770" y="234" width="93" height="22" rx="4" fill="url(#itemGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.25"/>
  <text x="816" y="249" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="8">Push</text>

  <rect x="668" y="260" width="93" height="22" rx="4" fill="url(#itemGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.25"/>
  <text x="714" y="275" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="8">Rebase</text>
  <rect x="770" y="260" width="93" height="22" rx="4" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="816" y="275" text-anchor="middle" fill="#22C55E" font-family="system-ui, sans-serif" font-size="8" font-weight="500">Merge</text>

  <!-- Right panel: History -->
