  <text x="58" y="192" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9">Refactor DB layer</text>
  <rect x="38" y="202" width="140" height="20" rx="3" fill="url(#itemGrad)" stroke="#3B82F6" stroke-width="0.3" stroke-opacity="0.2"/>
  <circle cx="49" cy="212" r="4" fill="#60A5FA" fill-opacity="0.8"/>
  <text x="58" y="216" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9">Fix login bug</text>
  <rect x="38" y="226" width="140" height="20" rx="3" fill="url(#itemGrad)" stroke="#3B82F6" stroke-width="0.3" stroke-opacity="0.2"/>
  <circle cx="49" cy="236" r="4" fill="#475569" fill-opacity="0.8"/>
  <text x="58" y="240" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Write unit tests</text>

