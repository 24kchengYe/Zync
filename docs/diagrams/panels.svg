  <text x="422" y="385" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="9" opacity="0.5">Main Area + Tool Panels</text>
  <text x="765" y="360" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="9" opacity="0.5">Git Actions Panel</text>

