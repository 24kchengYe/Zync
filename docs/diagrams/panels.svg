  <text x="675" y="328" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">b7e9012  Update route handlers</text>
  <text x="675" y="341" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">c1d5678  Add auth config</text>

  <!-- Labels -->
