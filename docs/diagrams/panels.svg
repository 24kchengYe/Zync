<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1218;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15222f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#162436;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#111d2b;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15222f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tabActiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15293f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tabInactiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#162436;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#111d2b;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="itemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#15293f;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="toolbarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3050;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0.9"/>
    </linearGradient>
