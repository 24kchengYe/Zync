<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1218;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="layerGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15222f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#162436;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111d2b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rendererGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#162d4a;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3352;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#142840;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15293f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3050;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0.9"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3B82F6" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">Zync 架构图</text>
  <text x="450" y="52" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">终端优先的 AI 代码助手管理器</text>

  <!-- Outer Electron container -->
  <rect x="30" y="65" width="840" height="420" rx="10" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="50" y="82" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.7">Electron 桌面应用</text>

  <!-- Renderer Process (left) -->
  <rect x="45" y="92" width="230" height="210" rx="8" fill="url(#rendererGrad)" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.25"/>
  <text x="160" y="112" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="600">渲染进程 (React 19)</text>

  <!-- Renderer components -->
  <rect x="60" y="122" width="200" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="160" y="141" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">侧边栏 &amp; 会话列表</text>

  <rect x="60" y="156" width="200" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="160" y="175" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">文件浏览器 &amp; 编辑器 (Monaco)</text>

  <rect x="60" y="190" width="200" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="160" y="209" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">终端 (XTerm.js)</text>

  <rect x="60" y="224" width="200" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="160" y="243" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">差异视图 &amp; 日志</text>

  <rect x="60" y="258" width="200" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="160" y="277" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">Zustand 状态管理</text>

  <!-- Main Process (right) -->
  <rect x="310" y="92" width="545" height="210" rx="8" fill="url(#mainGrad)" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.25"/>
  <text x="582" y="112" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="12" font-weight="600">主进程 (Node.js)</text>

  <!-- Main Process components - row 1 -->
  <rect x="325" y="122" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="405" y="141" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">会话管理器</text>

  <rect x="500" y="122" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="580" y="141" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">工作树管理器</text>

  <rect x="675" y="122" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="755" y="141" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">面板管理器</text>

  <!-- Main Process components - row 2 -->
  <rect x="325" y="158" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="405" y="177" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">Git 差异管理器</text>

  <rect x="500" y="158" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="580" y="177" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">Git 状态管理器</text>

  <rect x="675" y="158" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="755" y="177" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">配置管理器</text>

  <!-- Main Process components - row 3 -->
  <rect x="325" y="194" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="405" y="213" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">任务队列 (Bull)</text>

  <rect x="500" y="194" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="580" y="213" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">CLI 工具注册表</text>

  <rect x="675" y="194" width="160" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="755" y="213" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">权限 IPC 服务器</text>

  <!-- Main Process components - row 4 -->
  <rect x="325" y="230" width="250" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="450" y="249" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">IPC 处理器 (23 个模块)</text>

  <rect x="590" y="230" width="245" height="28" rx="5" fill="url(#boxGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="712" y="249" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="10">事件管理器</text>

  <!-- IPC Communication bar -->
  <rect x="45" y="310" width="810" height="30" rx="6" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="450" y="330" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="11" font-weight="500">IPC 通信层 (Electron contextBridge)</text>

  <!-- Arrows between Renderer and IPC bar -->
  <line x1="160" y1="302" x2="160" y2="310" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowDown)"/>
  <line x1="582" y1="302" x2="582" y2="310" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowDown)"/>

  <!-- Data layer -->
  <rect x="45" y="350" width="390" height="55" rx="8" fill="url(#layerGrad1)" stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="240" y="370" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="500">SQLite 数据库 (Better-SQLite3)</text>
  <text x="240" y="390" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">会话 | 输出 | 面板 | 差异 | 消息 | 项目</text>

  <rect x="455" y="350" width="400" height="55" rx="8" fill="url(#layerGrad1)" stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="655" y="370" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Git 工作树</text>
  <text x="655" y="390" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">每个会话独立分支 | 自动清理</text>

  <!-- Arrows from IPC bar to data layer -->
  <line x1="240" y1="340" x2="240" y2="350" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrowDown)"/>
  <line x1="655" y1="340" x2="655" y2="350" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrowDown)"/>

  <!-- CLI Tools layer -->
  <rect x="45" y="418" width="810" height="55" rx="8" fill="url(#layerGrad2)" stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.25"/>
  <text x="450" y="438" text-anchor="middle" fill="#93C5FD" font-family="system-ui, sans-serif" font-size="11" font-weight="500">CLI 工具实例 (node-pty)</text>

  <!-- CLI tool boxes -->
  <rect x="80" y="445" width="140" height="22" rx="4" fill="url(#cliGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="150" y="460" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Claude Code</text>

  <rect x="250" y="445" width="140" height="22" rx="4" fill="url(#cliGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="320" y="460" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Codex</text>

  <rect x="420" y="445" width="140" height="22" rx="4" fill="url(#cliGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="490" y="460" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Aider</text>

  <rect x="590" y="445" width="140" height="22" rx="4" fill="url(#cliGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="660" y="460" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="10" font-weight="500">终端 (Shell)</text>

  <rect x="755" y="445" width="80" height="22" rx="4" fill="url(#cliGrad)" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="795" y="460" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">...</text>

  <!-- Arrow from data layer to CLI -->
  <line x1="450" y1="405" x2="450" y2="418" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrowDown)"/>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">基于 Electron + React 19 + TypeScript + Tailwind CSS + Better-SQLite3 + node-pty 构建</text>
  <text x="450" y="525" text-anchor="middle" fill="#334155" font-family="system-ui, sans-serif" font-size="9">github.com/24kchengYe/Zync</text>
</svg>